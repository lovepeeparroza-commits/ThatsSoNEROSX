<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEROSX SHOP</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at center, #1a0000, #000000);
    font-family: Arial, sans-serif;
    color:white;
    text-align:center;
}

.container{
    animation: fade 2s ease;
}

h1{
    font-size:60px;
    letter-spacing:5px;
    color:#ff2a2a;
    text-shadow:0 0 20px red;
}

p{
    font-size:20px;
    color:#ccc;
    margin-top:10px;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">
    <h1>COMING SOON...</h1>
    <p>" ขออภัยในความไม่สะดวก หากพร้อมเมื่อไหร่ทางเราจะเปิดร้านตามปกติ "</p>
</div>

</body>
</html>
